name: ci-web-admin

on:
  push:
    branches: [main, "sprint-*"]
    paths: ["apps/web_admin/**", ".github/workflows/ci-web-admin.yml"]
  pull_request:
    branches: [main]
    paths: ["apps/web_admin/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web_admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web_admin/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
