name: ci-mobile-app

on:
  push:
    branches: [main, "sprint-*"]
    paths: ["apps/mobile_app/**", ".github/workflows/ci-mobile-app.yml"]
  pull_request:
    branches: [main]
    paths: ["apps/mobile_app/**"]

jobs:
  analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
