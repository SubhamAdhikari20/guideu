# =============================================================================
# GuideU — production orchestration
# -----------------------------------------------------------------------------
# Differences from the dev compose: production Django settings, gunicorn instead
# of the dev server, collectstatic on boot, restart policies, and datastores that
# are NOT published to the host (only Nginx is public). Bring up with:
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# All secrets come from the repo-root .env (see .env.example). Set a real
# DJANGO_SECRET_KEY and strong DB/Redis passwords before deploying.
# =============================================================================

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: config.settings.prod
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_DEBUG: "False"
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
  DJANGO_DB_ENGINE: django.db.backends.postgresql
  DJANGO_DB_NAME: ${POSTGRES_DB}
  DJANGO_DB_USER: ${POSTGRES_USER}
  DJANGO_DB_PASSWORD: ${POSTGRES_PASSWORD}
  DJANGO_DB_HOST: ${POSTGRES_HOST:-postgres}
  DJANGO_DB_PORT: ${POSTGRES_PORT:-5432}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  ANALYTICS_ENGINE_URL: ${ANALYTICS_ENGINE_URL:-http://analytics-engine:8001}
  ANALYTICS_API_KEY: ${ANALYTICS_API_KEY}

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_prod_data:/data/db

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_prod_data:/data

  core-engine:
    build:
      context: ./services/core-engine
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 60"
    environment: *django-env
    volumes:
      - media_prod_data:/app/media
      - static_prod_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  core-engine-worker:
    build:
      context: ./services/core-engine
    restart: always
    command: celery -A config worker -l warning --concurrency=4
    environment: *django-env
    depends_on:
      - core-engine
      - redis

  core-engine-beat:
    build:
      context: ./services/core-engine
    restart: always
    command: celery -A config beat -l warning
    environment: *django-env
    depends_on:
      - core-engine
      - redis

  analytics-engine:
    build:
      context: ./services/analytics-engine
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 2
    environment:
      ANALYTICS_HOST: 0.0.0.0
      ANALYTICS_PORT: "8001"
      ANALYTICS_API_KEY: ${ANALYTICS_API_KEY}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GUIDEU_DATASET_DIR: /data/travel-planning
      MODEL_ARTIFACT_DIR: /app/artifacts
    volumes:
      - ml_prod_artifacts:/app/artifacts
      - ../Travel Planning:/data/travel-planning:ro
    depends_on:
      - mongo
      - redis

  real-time-engine:
    build:
      context: ./services/real-time-engine
    restart: always
    command: node dist/server.js
    environment:
      REALTIME_PORT: "8002"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REALTIME_JWT_SECRET: ${REALTIME_JWT_SECRET:-${DJANGO_SECRET_KEY}}
      REALTIME_CORS_ORIGIN: ${REALTIME_CORS_ORIGIN}
      CORE_ENGINE_URL: ${CORE_ENGINE_URL:-http://core-engine:8000}
    depends_on:
      - redis

  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - static_prod_data:/app/staticfiles:ro
      - media_prod_data:/app/media:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - core-engine
      - analytics-engine
      - real-time-engine

volumes:
  postgres_prod_data:
  mongo_prod_data:
  redis_prod_data:
  media_prod_data:
  static_prod_data:
  ml_prod_artifacts:
