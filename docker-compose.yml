# =============================================================================
# GuideU — local development orchestration
# -----------------------------------------------------------------------------
# Brings up the full polyglot stack: PostgreSQL, MongoDB, Redis, the Django
# core-engine (+ Celery worker/beat), the FastAPI analytics-engine, and the
# Node real-time-engine. Frontends in ./apps (Flutter, Next.js) run on the host.
#
#   docker compose up --build
#
# All configuration comes from the repo-root .env (see .env.example).
# =============================================================================

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,core-engine}
  DJANGO_DB_ENGINE: django.db.backends.postgresql
  DJANGO_DB_NAME: ${POSTGRES_DB}
  DJANGO_DB_USER: ${POSTGRES_USER}
  DJANGO_DB_PASSWORD: ${POSTGRES_PASSWORD}
  DJANGO_DB_HOST: ${POSTGRES_HOST:-postgres}
  DJANGO_DB_PORT: ${POSTGRES_PORT:-5432}
  DJANGO_TIME_ZONE: ${DJANGO_TIME_ZONE:-Asia/Kathmandu}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
  ANALYTICS_ENGINE_URL: ${ANALYTICS_ENGINE_URL:-http://analytics-engine:8001}
  ANALYTICS_API_KEY: ${ANALYTICS_API_KEY:-change-me-internal-service-token}

services:
  # ---- Datastores ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Django core-engine --------------------------------------------------
  core-engine:
    build:
      context: ./services/core-engine
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment: *django-env
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  core-engine-worker:
    build:
      context: ./services/core-engine
    command: celery -A config worker -l info
    environment: *django-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  core-engine-beat:
    build:
      context: ./services/core-engine
    command: celery -A config beat -l info
    environment: *django-env
    depends_on:
      redis:
        condition: service_healthy

  # ---- FastAPI analytics-engine (ML) ---------------------------------------
  analytics-engine:
    build:
      context: ./services/analytics-engine
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    environment:
      ANALYTICS_HOST: 0.0.0.0
      ANALYTICS_PORT: "8001"
      ANALYTICS_API_KEY: ${ANALYTICS_API_KEY:-change-me-internal-service-token}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/${MONGO_DB}?authSource=admin
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GUIDEU_DATASET_DIR: /data/travel-planning
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI:-file:///app/mlruns}
      MODEL_ARTIFACT_DIR: ${MODEL_ARTIFACT_DIR:-/app/artifacts}
    volumes:
      - ml_artifacts:/app/artifacts
      - ml_runs:/app/mlruns
      # Mount the synthetic dataset read-only so training/seeding can read it.
      - ../Travel Planning:/data/travel-planning:ro
    ports:
      - "8001:8001"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Node real-time-engine -----------------------------------------------
  real-time-engine:
    build:
      context: ./services/real-time-engine
    command: node dist/server.js
    environment:
      REALTIME_PORT: "8002"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REALTIME_JWT_SECRET: ${REALTIME_JWT_SECRET:-${DJANGO_SECRET_KEY}}
      REALTIME_CORS_ORIGIN: ${REALTIME_CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy

  # ---- MLflow tracking UI --------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    command: >
      mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri /mlruns
      --artifacts-destination /mlruns/artifacts
    volumes:
      - ml_runs:/mlruns
    ports:
      - "${MLFLOW_PORT:-5000}:5000"

  # ---- Nginx API gateway / reverse proxy -----------------------------------
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - core-engine
      - analytics-engine
      - real-time-engine

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  media_data:
  ml_artifacts:
  ml_runs:
