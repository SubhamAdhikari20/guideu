# GuideU API gateway — path-based routing to the polyglot backend services.
# The Next.js admin runs on the host during development; nginx reaches it via
# host.docker.internal (configured with extra_hosts in docker-compose.yml).

upstream core_engine {
    server core-engine:8000;
}
upstream analytics_engine {
    server analytics-engine:8001;
}
upstream realtime_engine {
    server real-time-engine:8002;
}
upstream web_admin {
    server host.docker.internal:3000;
}

server {
    listen 80;
    server_name localhost guideu.local;

    # ---- Security headers (defence in depth at the gateway) ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- Django core-engine (REST API + admin + static/media) ----
    location /api/ {
        proxy_pass http://core_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        proxy_pass http://core_engine;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /static/ {
        proxy_pass http://core_engine;
    }
    location /media/ {
        proxy_pass http://core_engine;
    }

    # ---- FastAPI analytics-engine (ML inference; /ml/* -> service root) ----
    location /ml/ {
        proxy_pass http://analytics_engine/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Node real-time-engine (Socket.IO with WebSocket upgrade) ----
    location /socket.io/ {
        proxy_pass http://realtime_engine;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ---- Next.js web-admin (host-run in dev) ----
    location / {
        proxy_pass http://web_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
